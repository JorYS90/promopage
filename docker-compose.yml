# =============================================
# Encarte Builder / PromoPage — docker-compose
# =============================================
# Sobe API (Node) + Web (Nginx servindo Vite build) + volumes persistentes.
#
# Primeiro uso:
#   1. cp backend/.env.example backend/.env
#   2. Edite backend/.env (gere JWT_SECRET forte, defina CORS_ORIGIN)
#   3. docker compose up -d --build
#   4. Acesse http://localhost:8080 (web) — API em http://localhost:8080/api/health
#      (em produção, Caddy fica na 80/443 e faz reverse_proxy pra 8080)
#
# Logs:    docker compose logs -f api
# Stop:    docker compose down
# Rebuild: docker compose up -d --build
# Backup:  docker compose exec api npm run backup

# Nome explícito do projeto (evita prefixos derivados do nome da pasta,
# que pode ter espaços ou caracteres especiais e gerar nomes esquisitos).
name: promopage

services:
  api:
    build: ./backend
    container_name: promopage-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override quando o user esquece de definir no .env
      NODE_ENV: production
      PORT: 4010
    volumes:
      - api_data:/app/data            # SQLite + JSONs
      - api_uploads:/app/uploads      # imagens enviadas
      - api_projetos:/app/projetos    # encartes salvos
      - api_backups:/app/backups      # backups locais
      - api_logs:/app/logs
      # Templates customizados criados via POST /api/templates ficam aqui.
      # Sem este volume, todo `up -d --build` apagava os temas novos do usuário.
      # IMPORTANTE: o Docker auto-popula este volume com os templates default
      # do build APENAS na primeira criação. Edits manuais em backend/templates
      # após volume existir NÃO são refletidos — pra atualizar manualmente
      # precisa copiar via `docker cp` ou recriar o volume.
      - api_templates:/app/templates
    # Health check — docker reinicia se API morrer.
    # Usa node nativo (fetch é built-in em Node 18+) em vez de wget/curl,
    # pois a imagem node:slim não vem com eles instalados.
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://localhost:4010/api/health')
            .then(r => process.exit(r.ok ? 0 : 1))
            .catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Não expõe porta pra host — só pro nginx (na mesma network)
    expose:
      - "4010"

  web:
    build: ./frontend
    container_name: promopage-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      # Porta 8080 do HOST -> 80 do container nginx.
      # Em produção, Caddy escuta na 80/443 e faz reverse_proxy localhost:8080.
      # Em dev local, acesse http://localhost:8080
      - "8080:80"

  # Job de BACKUP diário — roda às 3h da manhã via cron interno
  # Sem isso, você precisa configurar cron NO HOST. Esse container faz tudo dentro.
  backup:
    build: ./backend
    container_name: promopage-backup
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - api_data:/app/data:ro       # leitura do banco (só leitura mesmo)
      - api_backups:/app/backups    # escreve aqui
    # Loop infinito: dorme até 03:00 e roda backup. Simples e confiável.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          # Calcula segundos até as 03:00 do próximo dia
          NOW=$$(date +%s)
          NEXT=$$(date -d "tomorrow 03:00" +%s 2>/dev/null || date -d "03:00 +1 day" +%s)
          SLEEP=$$((NEXT - NOW))
          echo "[backup] próximo backup em $$SLEEP segundos (03:00)"
          sleep $$SLEEP
          echo "[backup] executando..."
          node scripts/backup-db.js || echo "[backup] FALHOU"
        done

volumes:
  api_data:
    driver: local
  api_uploads:
    driver: local
  api_projetos:
    driver: local
  api_backups:
    driver: local
  api_logs:
    driver: local
  api_templates:
    driver: local
