# Nginx config — frontend PromoPage
# - Serve estáticos com cache agressivo (1 ano em /assets, 0 em index.html)
# - SPA fallback: qualquer rota desconhecida → /index.html
# - Proxy reverso: /api/* e /uploads/* → backend Node em :4010

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compressão (HTML/CSS/JS/JSON)
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  # Segurança básica
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Assets do Vite (com hash no nome) → cache 1 ano
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # /api e /uploads → backend Node
  # "api" é o nome do serviço no docker-compose
  location /api/ {
    proxy_pass http://api:4010/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Uploads grandes (até 12MB pra dar folga sobre o limite do multer de 10MB)
    client_max_body_size 12m;
  }

  location /uploads/ {
    proxy_pass http://api:4010/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  # SPA fallback — toda rota desconhecida volta pro index.html
  # (React Router cuida da navegação client-side)
  location / {
    try_files $uri $uri/ /index.html;
    # index.html nunca pode ser cacheado (pra deploys novos serem vistos na hora)
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
