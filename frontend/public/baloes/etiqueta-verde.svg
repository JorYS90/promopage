<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" preserveAspectRatio="none">
  <defs>
    <filter id="sh6" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="g6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <!-- Tag shape: retângulo com ponta no lado esquerdo (formato de etiqueta) -->
  <path d="M 60,15 L 580,15 L 580,135 L 60,135 L 15,75 Z"
        fill="url(#g6)" stroke="#ffffff" stroke-width="3" filter="url(#sh6)"/>
  <!-- Furo da etiqueta (cordinha) -->
  <circle cx="80" cy="75" r="10" fill="#ffffff"/>
  <circle cx="80" cy="75" r="6" fill="#15803d"/>
</svg>
